<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대숲 버티기 - Bamboo Survivor</title>
<style>
  :root {
    --bg: #0e1410;
    --panel: #16201a;
    --bamboo: #2f6b3f;
    --bamboo-light: #4a9c5c;
    --accent: #ffd873;
    --danger: #ff5b5b;
    --text: #eef5ee;
    --dim: #7c9483;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at center, #1a2a1c 0%, var(--bg) 75%);
    font-family: 'Courier New', monospace;
    color: var(--text);
    gap: 14px;
    padding: 20px;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(255,216,115,0.4);
  }
  #hud {
    display: flex;
    gap: 30px;
    font-size: 14px;
    color: var(--dim);
  }
  #hud span { color: var(--text); font-weight: bold; }
  #wrap {
    position: relative;
    border: 2px solid #2c3d2e;
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(74,156,92,0.12), inset 0 0 50px rgba(0,0,0,0.4);
    background: var(--panel);
  }
  canvas { display: block; border-radius: 4px; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(14,20,16,0.88);
    backdrop-filter: blur(2px);
    border-radius: 4px;
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { margin: 0; color: var(--danger); font-size: 20px; letter-spacing: 2px; }
  #overlay p { margin: 3px 0; color: var(--dim); font-size: 13px; }
  button {
    margin-top: 10px;
    padding: 10px 24px;
    background: var(--accent);
    color: #0e1410;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  #hint {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  #diffRow {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .diffBtn {
    margin-top: 0;
    padding: 9px 14px;
    font-size: 12px;
    background: #2a3a2c;
    color: var(--text);
    border: 1px solid #3d5240;
  }
  .diffBtn.easy { border-color: #4a9c5c; }
  .diffBtn.normal { border-color: #ffd873; }
  .diffBtn.impossible { border-color: #ff5b5b; color: #ffb3b3; }
  .diffBtn:hover { filter: brightness(1.25); }
  .diffBtn.selected { background: var(--accent); color: #0e1410; }
  #hof {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid #2c3d2e;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
  }
  #hof h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  #hof ol {
    margin: 0;
    padding-left: 20px;
    color: var(--dim);
  }
  #hof li { margin: 3px 0; }
  #hof li.legend { color: var(--danger); font-weight: bold; }
  #hof li span.name { color: var(--text); }
  #nameInput {
    margin-top: 6px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 14px;
    background: #0e1410;
    border: 1px solid #3d5240;
    color: var(--text);
    border-radius: 4px;
    text-align: center;
    width: 200px;
  }
  #nameInput:focus { outline: none; border-color: var(--accent); }
  .loyaltyRow { display: flex; gap: 10px; margin-top: 10px; }
  .agreeBtn { background: #4a9c5c; color: #08130a; }
  .disagreeBtn { background: var(--danger); color: #2a0505; }
  #overlay.banned {
    background: rgba(20,4,4,0.95);
  }
  #overlay.banned h2 { color: var(--danger); font-size: 26px; }
</style>
</head>
<body>

  <h1>대숲 버티기 // BAMBOO SURVIVOR</h1>
  <div id="hud">
    <div>플레이어 <span id="nameDisp">-</span></div>
    <div>시간 <span id="timeDisp">0.00</span>s</div>
    <div>난이도 <span id="diffDisp">-</span></div>
    <div>최고기록 <span id="bestDisp">0.00</span>s</div>
    <div>레벨 <span id="levelDisp">1</span></div>
  </div>

  <div id="wrap">
    <canvas id="game" width="480" height="480"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">화살을 피해 버텨라</h2>
      <p>방향키(← ↑ ↓ →)로 이동</p>
      <p>화살촉(●)에 맞으면 죽는다. 화살대는 스쳐도 안전.</p>
      <p>입장하려면 이름을 입력하세요</p>
      <input type="text" id="nameInput" placeholder="이름을 입력..." maxlength="12">
      <button id="nameSubmitBtn">다음</button>
    </div>
  </div>

  <div id="hof">
    <h3>명예의 전당</h3>
    <ol>
      <li class="legend">대<span class="name">Jackie</span>님의 기록 : 4분 18.00초 <span style="color:var(--dim); font-weight:normal;">(Jackie급)</span></li>
      <li id="hofMine">아직 도전 기록 없음</li>
    </ol>
  </div>

  <div id="hint">SPACE로 일시정지 · R로 재시작</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const timeDisp = document.getElementById('timeDisp');
const nameDisp = document.getElementById('nameDisp');
const diffDisp = document.getElementById('diffDisp');
const bestDisp = document.getElementById('bestDisp');
const levelDisp = document.getElementById('levelDisp');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const hofMine = document.getElementById('hofMine');

let playerName = '';
let banned = false;

// ---------- Difficulty ----------
const DIFFICULTIES = {
  easy: {
    label: '으정급 (쉬움)',
    spawnBase: 75, spawnDecay: 1.3, spawnFloor: 26,
    speedBase: 1.9, speedGrowth: 0.06,
    arrowRampDiv: 1.6, // slower ramp of arrow count
  },
  normal: {
    label: '영진급 (보통)',
    spawnBase: 55, spawnDecay: 2.2, spawnFloor: 14,
    speedBase: 2.6, speedGrowth: 0.11,
    arrowRampDiv: 1.0,
  },
  impossible: {
    label: 'Jackie급 (불가능)',
    spawnBase: 20, spawnDecay: 4.2, spawnFloor: 3,
    speedBase: 5.6, speedGrowth: 0.34,
    arrowRampDiv: 0.3, // arrows ramp up brutally fast
  },
};
let currentDifficulty = 'normal';

function diffCfg() { return DIFFICULTIES[currentDifficulty]; }

// ---------- Player ----------
const player = {
  x: W/2, y: H/2,
  r: 7,
  speed: 3.4,
};
let keys = { up:false, down:false, left:false, right:false };

// ---------- Game state ----------
let running = false, paused = false;
let survivalTime = 0;
let best = 0;

function bestKey(diff) { return 'bamboo_best_' + diff; }
function loadBest(diff) {
  return parseFloat(localStorage.getItem(bestKey(diff)) || '0') || 0;
}

let arrows = [];
let spawnTimer = 0;
let level = 1;
let frameCount = 0;

// Difficulty-scaled curve
function getSpawnInterval() {
  const c = diffCfg();
  return Math.max(c.spawnFloor, c.spawnBase - survivalTime * c.spawnDecay);
}
function getArrowSpeed() {
  const c = diffCfg();
  return c.speedBase + survivalTime * c.speedGrowth;
}
function getArrowsPerSpawn() {
  const t = survivalTime * diffCfg().arrowRampDiv;
  if (t < 5) return 1;
  if (t < 12) return Math.random() < 0.6 ? 1 : 2;
  if (t < 20) return Math.random() < 0.5 ? 2 : 3;
  return 2 + Math.floor(Math.random() * 3); // 2~4
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(2).padStart(5, '0');
  return `${m}분 ${s}초`;
}

function refreshHallOfFame() {
  const b = loadBest(currentDifficulty);
  if (b > 0) {
    hofMine.innerHTML = `내 최고기록 (${diffCfg().label}) : ${formatMMSS(b)}`;
  } else {
    hofMine.textContent = `아직 도전 기록 없음 (${diffCfg().label})`;
  }
}

function spawnArrow() {
  const count = getArrowsPerSpawn();
  for (let i = 0; i < count; i++) {
    // spawn from random edge, aimed roughly at player with some spread
    const edge = Math.floor(Math.random() * 4);
    let sx, sy;
    const margin = 40;
    if (edge === 0) { sx = -margin; sy = Math.random() * H; }
    else if (edge === 1) { sx = W + margin; sy = Math.random() * H; }
    else if (edge === 2) { sx = Math.random() * W; sy = -margin; }
    else { sx = Math.random() * W; sy = H + margin; }

    const targetX = player.x + (Math.random() - 0.5) * 160;
    const targetY = player.y + (Math.random() - 0.5) * 160;
    let angle = Math.atan2(targetY - sy, targetX - sx);
    angle += (Math.random() - 0.5) * 0.35; // spread

    const speed = getArrowSpeed() * (0.85 + Math.random() * 0.3);
    arrows.push({
      x: sx, y: sy,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      len: 12,
      tipR: 1.8, // only the tip is dangerous
    });
  }
}

function resetGame() {
  player.x = W/2; player.y = H/2;
  arrows = [];
  survivalTime = 0;
  spawnTimer = 0;
  level = 1;
  frameCount = 0;
  timeDisp.textContent = '0.00';
  levelDisp.textContent = '1';
  diffDisp.textContent = diffCfg().label;
  best = loadBest(currentDifficulty);
  bestDisp.textContent = best.toFixed(2);
}

function startGame() {
  resetGame();
  running = true;
  paused = false;
  overlay.classList.add('hidden');
}

function chooseDifficulty(diff) {
  currentDifficulty = diff;
  startGame();
}

function renderDifficultyScreen() {
  overlay.classList.remove('banned');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>${escapeHtml(playerName)}님, 난이도를 선택하세요</h2>
    <p>방향키(← ↑ ↓ →)로 이동 · 화살촉(●)만 위험</p>
    <div id="diffRow">
      <button class="diffBtn easy" data-diff="easy">으정급 (쉬움)</button>
      <button class="diffBtn normal" data-diff="normal">영진급 (보통)</button>
      <button class="diffBtn impossible" data-diff="impossible">Jackie급 (불가능)</button>
    </div>
  `;
  overlay.querySelectorAll('.diffBtn').forEach(btn => {
    btn.addEventListener('click', () => chooseDifficulty(btn.dataset.diff));
  });
}

function renderBannedScreen() {
  banned = true;
  overlay.classList.remove('hidden');
  overlay.classList.add('banned');
  overlay.innerHTML = `
    <h2>추방됨</h2>
    <p>${escapeHtml(playerName)}님, 당신은 추방되었습니다.</p>
    <p style="color:var(--dim); font-size:11px;">대Jackie님의 기록을 인정하지 않는 자는 대숲에 들어올 수 없습니다.</p>
  `;
}

function renderLoyaltyScreen() {
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>사상 검증</h2>
    <p>${escapeHtml(playerName)}, 당신은 대Jackie님의 기록(4분 18초)을 인정하십니까?</p>
    <div class="loyaltyRow">
      <button class="agreeBtn" id="agreeBtn">AGREE</button>
      <button class="disagreeBtn" id="disagreeBtn">DISAGREE</button>
    </div>
  `;
  document.getElementById('agreeBtn').addEventListener('click', renderDifficultyScreen);
  document.getElementById('disagreeBtn').addEventListener('click', renderBannedScreen);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('nameSubmitBtn').addEventListener('click', submitName);
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  e.stopPropagation();
  if (e.key === 'Enter') submitName();
});

function submitName() {
  const val = document.getElementById('nameInput').value.trim();
  playerName = val || '무명';
  nameDisp.textContent = playerName;
  renderLoyaltyScreen();
}

function endGame() {
  running = false;
  if (survivalTime > best) {
    best = survivalTime;
    localStorage.setItem(bestKey(currentDifficulty), best.toFixed(2));
  }
  bestDisp.textContent = best.toFixed(2);
  refreshHallOfFame();
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h2>화살에 맞았다!</h2>
    <p>난이도: ${diffCfg().label}</p>
    <p>생존 시간: ${survivalTime.toFixed(2)}초</p>
    <p>최고 기록: ${best.toFixed(2)}초</p>
    <button id="retryBtn">같은 난이도로 재도전</button>
    <div id="diffRow" style="margin-top:6px;">
      <button class="diffBtn easy" data-diff="easy">으정급 (쉬움)</button>
      <button class="diffBtn normal" data-diff="normal">영진급 (보통)</button>
      <button class="diffBtn impossible" data-diff="impossible">Jackie급 (불가능)</button>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => chooseDifficulty(currentDifficulty));
  overlay.querySelectorAll('.diffBtn').forEach(btn => {
    btn.addEventListener('click', () => chooseDifficulty(btn.dataset.diff));
  });
}

refreshHallOfFame();

// ---------- Input ----------
document.addEventListener('keydown', (e) => {
  if (banned) return;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();

  if (!running && e.code === 'Space' && overlay.querySelector('.diffBtn')) { chooseDifficulty(currentDifficulty); return; }
  if (e.code === 'KeyR' && (running || overlay.querySelector('.diffBtn'))) { chooseDifficulty(currentDifficulty); return; }
  if (e.code === 'Space' && running) { paused = !paused; return; }

  if (e.code === 'ArrowUp') keys.up = true;
  if (e.code === 'ArrowDown') keys.down = true;
  if (e.code === 'ArrowLeft') keys.left = true;
  if (e.code === 'ArrowRight') keys.right = true;
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowUp') keys.up = false;
  if (e.code === 'ArrowDown') keys.down = false;
  if (e.code === 'ArrowLeft') keys.left = false;
  if (e.code === 'ArrowRight') keys.right = false;
});

// ---------- Drawing ----------
function drawBackground() {
  ctx.fillStyle = '#16201a';
  ctx.fillRect(0, 0, W, H);
  // faint bamboo stalks
  ctx.strokeStyle = 'rgba(74,156,92,0.12)';
  ctx.lineWidth = 14;
  for (let i = 0; i < 6; i++) {
    const x = 40 + i * (W - 80) / 5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  // circular arena boundary
  ctx.strokeStyle = 'rgba(255,216,115,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, H/2, Math.min(W,H)/2 - 20, 0, Math.PI*2);
  ctx.stroke();
}

function drawPlayer() {
  // simple hooded figure: circle body + triangle hat
  ctx.save();
  ctx.translate(player.x, player.y);
  const s = 0.7; // 30% smaller overall silhouette

  // body
  ctx.fillStyle = '#f4e4c1';
  ctx.beginPath();
  ctx.arc(0, 4*s, player.r, 0, Math.PI*2);
  ctx.fill();

  // hat (conical, gat-style)
  ctx.fillStyle = '#3a3f36';
  ctx.beginPath();
  ctx.moveTo(-16*s, 0);
  ctx.lineTo(16*s, 0);
  ctx.lineTo(0, -18*s);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 0, 17*s, 4*s, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawArrows() {
  for (const a of arrows) {
    const angle = Math.atan2(a.dy, a.dx);
    const tailX = a.x - Math.cos(angle) * a.len;
    const tailY = a.y - Math.sin(angle) * a.len;

    // shaft (safe part)
    ctx.strokeStyle = '#c9a86a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(a.x, a.y);
    ctx.stroke();

    // fletching
    ctx.strokeStyle = '#e8ecf1';
    ctx.lineWidth = 0.8;
    const fx = tailX + Math.cos(angle) * 2.2;
    const fy = tailY + Math.sin(angle) * 2.2;
    ctx.beginPath();
    ctx.moveTo(tailX - Math.sin(angle)*1.8, tailY + Math.cos(angle)*1.8);
    ctx.lineTo(fx, fy);
    ctx.moveTo(tailX + Math.sin(angle)*1.8, tailY - Math.cos(angle)*1.8);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    // tip (dangerous part) — small glowing red dot
    ctx.fillStyle = '#ff5b5b';
    ctx.shadowColor = '#ff5b5b';
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.tipR, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ---------- Update ----------
function update(dt) {
  if (!running || paused) return;

  frameCount++;
  survivalTime += dt;
  timeDisp.textContent = survivalTime.toFixed(2);

  const newLevel = 1 + Math.floor(survivalTime / 8);
  if (newLevel !== level) {
    level = newLevel;
    levelDisp.textContent = level;
  }

  // move player
  let mx = 0, my = 0;
  if (keys.up) my -= 1;
  if (keys.down) my += 1;
  if (keys.left) mx -= 1;
  if (keys.right) mx += 1;
  if (mx !== 0 || my !== 0) {
    const len = Math.hypot(mx, my);
    mx /= len; my /= len;
    player.x += mx * player.speed;
    player.y += my * player.speed;
  }
  // clamp inside circular arena
  const cx = W/2, cy = H/2, radius = Math.min(W,H)/2 - 22;
  const ddx = player.x - cx, ddy = player.y - cy;
  const dist = Math.hypot(ddx, ddy);
  if (dist > radius) {
    player.x = cx + (ddx/dist) * radius;
    player.y = cy + (ddy/dist) * radius;
  }

  // spawn arrows
  spawnTimer -= 1;
  if (spawnTimer <= 0) {
    spawnArrow();
    spawnTimer = getSpawnInterval();
  }

  // update arrows, remove offscreen, check collision (tip only)
  for (let i = arrows.length - 1; i >= 0; i--) {
    const a = arrows[i];
    a.x += a.dx;
    a.y += a.dy;

    if (a.x < -60 || a.x > W + 60 || a.y < -60 || a.y > H + 60) {
      arrows.splice(i, 1);
      continue;
    }

    const d = Math.hypot(a.x - player.x, a.y - player.y);
    if (d < a.tipR + player.r * 0.55) {
      endGame();
      return;
    }
  }
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  update(dt);
  drawBackground();
  drawArrows();
  drawPlayer();
  requestAnimationFrame(loop);
}

drawBackground();
drawPlayer();
requestAnimationFrame(loop);
</script>
</body>
</html>
