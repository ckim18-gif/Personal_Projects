<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<body><main id="app"><canvas id="game" width="640" height="360"></canvas>
